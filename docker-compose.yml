services:
  mongodb:
    image: mongo:8.0
    container_name: server-mgmt-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: servermgmt
    volumes:
      - mongodb_data:/data/db
    networks:
      - server-mgmt-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: server-mgmt-backend
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/servermgmt?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - server-mgmt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: server-mgmt-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - server-mgmt-network

  nginx:
    image: nginx:1.27-alpine
    container_name: server-mgmt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - server-mgmt-network

volumes:
  mongodb_data:

networks:
  server-mgmt-network:
    driver: bridge
